<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Track</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/dashboard.css" />
  <link rel="icon" type="image/png" href="../resources/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <div class="brand">Job<span>Track</span></div>
</header>

<div class="page">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section-label">Views</div>
    <button class="nav-btn active" id="nav-all">All <span class="nav-count" id="count-all">0</span></button>
    <button class="nav-btn" id="nav-starred">Starred <span class="nav-count" id="count-starred">0</span></button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Status</div>
    <button class="nav-btn" id="nav-applied">Applied <span class="nav-count" id="count-applied">0</span></button>
    <button class="nav-btn" id="nav-interview">Interview <span class="nav-count" id="count-interview">0</span></button>
    <button class="nav-btn" id="nav-offer">Offer <span class="nav-count" id="count-offer">0</span></button>
    <button class="nav-btn" id="nav-rejected">Rejected <span class="nav-count" id="count-rejected">0</span></button>
    <button class="nav-btn" id="nav-withdrawn">Withdrawn <span class="nav-count" id="count-withdrawn">0</span></button>
    
    <p style="margin-top:auto!important;">© 2026 KeeganCo15</p>
  </div>

  <!-- Main area -->
  <div class="main">

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="stat-interview">0</div>
        <div class="stat-label">Interviews</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="stat-offer">0</div>
        <div class="stat-label">Offers</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="stat-rate">0%</div>
        <div class="stat-label">Response rate</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search-input" id="search-bar" type="text" placeholder="Search jobs or companies...">

      <span class="sort-label">Site:</span>
      <select class="filter-select" id="filter-site">
        <option value="">All</option>
        <option value="Indeed">Indeed</option>
        <option value="LinkedIn">LinkedIn</option>
        <option value="Glassdoor">Glassdoor</option>
        <option value="Other">Other</option>
      </select>

      <span class="sort-label">Sort:</span>
      <select class="filter-select" id="sort-select">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="company">Company A–Z</option>
        <option value="status">Status</option>
      </select>

      <div class="toolbar-right">
        <span class="count-label" id="results-count">0 jobs</span>
        <button class="btn-add" id="add-job-btn"><i class="fa-solid fa-plus"></i> Add Job</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="jobTitle">Role</th>
            <th data-col="company">Company</th>
            <th data-col="location">Location</th>
            <th data-col="salary">Salary</th>
            <th data-col="date">Applied</th>
            <th data-col="site">Site</th>
            <th data-col="status">Status</th>
            <th>Link</th>
            <th><i class="fa-solid fa-star"></i></th>
          </tr>
        </thead>
        <tbody id="job-list"></tbody>
      </table>
      <div id="empty-state" class="empty-state hidden">
        <div>No applications found.</div>
        <p>Try changing your filters, or add your first job above.</p>
      </div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add Application</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <form id="add-job-form">
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Job Title *</label>
            <input id="f-jobTitle" type="text" required placeholder="e.g. Frontend Developer">
          </div>
          <div class="form-group">
            <label>Company *</label>
            <input id="f-company" type="text" required placeholder="e.g. Acme Corp">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Location</label>
            <input id="f-location" type="text" placeholder="e.g. London / Remote">
          </div>
          <div class="form-group">
            <label>Salary</label>
            <input id="f-salary" type="text" placeholder="e.g. £45,000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date Applied</label>
            <input id="f-date" type="date">
          </div>
          <div class="form-group">
            <label>Site</label>
            <select id="f-site">
              <option value="Indeed">Indeed</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Glassdoor">Glassdoor</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select id="f-status">
              <option value="Applied">Applied</option>
              <option value="Interview">Interview</option>
              <option value="Offer">Offer</option>
              <option value="Rejected">Rejected</option>
              <option value="Withdrawn">Withdrawn</option>
            </select>
          </div>
          <div class="form-group">
            <label>Job Link</label>
            <input id="f-link" type="url" placeholder="https://...">
          </div>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea id="f-notes" placeholder="Interview notes, contact info..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-cancel-modal" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn-save" id="modal-submit">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="../scripts/dashboard.js" defer></script>
</body>
</html>
